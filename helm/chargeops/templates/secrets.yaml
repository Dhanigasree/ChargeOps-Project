{{- if .Values.secrets.create }}
{{- range $name, $data := omit .Values.secrets "create" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ include "chargeops.namespace" $ }}
  labels:
    {{- include "chargeops.commonLabels" $ | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := $data }}
  {{- if eq (toString $value) "CHANGE_ME" }}
  {{- fail (printf "Set a non-placeholder value for secrets.%s.%s" $name $key) }}
  {{- end }}
  {{ $key }}: {{ required (printf "Set secrets.%s.%s" $name $key) $value | quote }}
  {{- end }}
---
{{- end }}
{{- end }}
