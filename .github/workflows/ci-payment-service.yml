name: Payment Service CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - test
    paths:
      - "ev-backend/services/payment-service/**"
      - ".github/workflows/ci-payment-service.yml"

permissions:
  contents: write
  id-token: write
  security-events: write

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "497676936148"
  SERVICE: payment-service
  SERVICE_DIR: ev-backend/services/payment-service
  ECR_REPOSITORY: chargeops/payment-service
  MANIFEST_PATHS: |
    argocd/prod/services/backend-services.yaml
    argocd/prod/services/sqs-workers.yaml

jobs:
  ci:
    name: Build, scan, push, and promote payment-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ env.SERVICE_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm install

      - name: Lint
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run lint --if-present

      - name: Test
        working-directory: ${{ env.SERVICE_DIR }}
        shell: bash
        run: |
          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts.test ? 0 : 1);"; then
            npm test
          else
            echo "No test script found, skipping tests for this service"
          fi

      - name: SonarCloud code quality scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=Dhanigasree_ChargeOps
            -Dsonar.organization=dhanigasree
            -Dsonar.sources=${{ env.SERVICE_DIR }}
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**
            -Dsonar.qualitygate.wait=true

      - name: Snyk dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=${{ env.SERVICE_DIR }}/package.json --severity-threshold=high

      - name: Snyk summary
        if: always()
        run: |
          echo "Snyk dependency scan completed for ${SERVICE} with threshold high."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}
          docker build -t "$IMAGE_URI" "$SERVICE_DIR"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker image
        run: docker push "$IMAGE_URI"

      - name: Update ArgoCD image tag
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          image = os.environ["IMAGE_URI"]
          repo = os.environ["ECR_REPOSITORY"]
          changed = False
          for path in [Path(p.strip()) for p in os.environ["MANIFEST_PATHS"].splitlines() if p.strip()]:
              if not path.exists():
                  continue
              lines = path.read_text(encoding="utf-8").splitlines()
              updated = []
              for line in lines:
                  stripped = line.strip()
                  if stripped.startswith("image:") and repo in stripped:
                      indent = line[: len(line) - len(line.lstrip())]
                      line = f"{indent}image: {image}"
                      changed = True
                  updated.append(line)
              path.write_text("\n".join(updated) + "\n", encoding="utf-8")
          if not changed:
              raise SystemExit(f"No image line updated for {repo}")
          PY

      - name: Commit updated image tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add argocd/prod
          if git diff --cached --quiet; then
            echo "No image tag changes to commit."
            exit 0
          fi
          git commit -m "ci: update payment-service image to ${GITHUB_SHA} [skip ci]"
          git push
