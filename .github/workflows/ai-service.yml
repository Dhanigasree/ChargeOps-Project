name: AI Service  

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'chargeops/ai-service' }}
  SERVICE_DIR: ev-backend/services/ai-service
  MANIFEST_PATH: k8s/prod/ai-service.yaml
  ARGOCD_APP: chargeops-ai-service

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ env.SERVICE_DIR }}/package.json

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm install

      - name: Test
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm test

      - name: Build Docker image for scan
        if: success()
        run: docker build -t ai-service:${{ github.sha }} ${{ env.SERVICE_DIR }}

      - name: Security scan
        if: success()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-service:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results
        if: hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  docker-build-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-test-scan
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image
        id: image
        run: echo "image=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-kubernetes-manifest:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update AI service image
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          manifest_path = pathlib.Path("${{ env.MANIFEST_PATH }}")
          image = "${{ needs.docker-build-push.outputs.image }}"
          content = manifest_path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r"^(\s*image:\s+).*/chargeops/ai-service:\S+\s*$",
              lambda match: f"{match.group(1)}{image}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              print(f"Unable to update ai-service image in {manifest_path}", file=sys.stderr)
              sys.exit(1)
          manifest_path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit and push manifest update
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${{ env.MANIFEST_PATH }}"
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "ci: update ai-service image to ${{ github.sha }} [skip ci]"
          git push

  argocd-sync:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: update-kubernetes-manifest
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Sync AI service
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync "${{ env.ARGOCD_APP }}" --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web
          argocd app wait "${{ env.ARGOCD_APP }}" --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --health --timeout 300 --grpc-web
