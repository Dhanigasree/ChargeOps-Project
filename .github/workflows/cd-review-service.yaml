name: CD - review-service

on: 
  push:
    branches: [dev, main]
    paths:
      - "ev-backend/services/review-service/**"

permissions:
  contents: write

jobs:
  cd:
    name: Run CD template
    uses: ./.github/workflows/cd-backend-template.yaml
    with:
      service: review-service
      working_directory: ev-backend/services/review-service
      k8s_manifest_path: k8s/dev/review-service/deployment.yaml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

