name: Reusable CI Template - Backend (Node.js)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "24"
      test_command:
        required: false
        type: string
        default: "npm run test -- --coverage"
      sonar_project_base_dir:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      head_ref:
        required: true
        type: string
      actor:
        required: true
        type: string
      pr_url:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      NOTIFY_EMAIL:
        required: true

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.test_command }}

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ inputs.sonar_project_base_dir }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Send SonarQube failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [${{ inputs.service }}] SonarQube — PR #${{ inputs.pr_number }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CI Pipeline <${{ secrets.MAIL_USERNAME }}>
          body: |
            SonarQube checks failed for this pull request.
            Service: ${{ inputs.service }}
            Branch: ${{ inputs.head_ref }}
            Author: ${{ inputs.actor }}
            PR URL: ${{ inputs.pr_url }}

            Please review the code quality or coverage issues and fix them before requesting approval again.

  snyk:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: npm ci

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        with:
          args: --file=${{ inputs.working_directory }}/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Send Snyk failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [${{ inputs.service }}] Snyk — PR #${{ inputs.pr_number }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CI Pipeline <${{ secrets.MAIL_USERNAME }}>
          body: |
            Snyk detected vulnerabilities during this pull request check.
            Service: ${{ inputs.service }}
            Branch: ${{ inputs.head_ref }}
            Author: ${{ inputs.actor }}
            PR URL: ${{ inputs.pr_url }}

            Please fix the reported dependency vulnerabilities before requesting approval again.

  docker-build:
    runs-on: ubuntu-latest
    needs: snyk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working_directory }}
          file: ${{ inputs.working_directory }}/Dockerfile
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:pr-${{ inputs.pr_number }}
          build-args: NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/service-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-image
          path: /tmp/service-image.tar
          retention-days: 1

      - name: Send Docker build failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [${{ inputs.service }}] Docker Build — PR #${{ inputs.pr_number }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CI Pipeline <${{ secrets.MAIL_USERNAME }}>
          body: |
            Docker image build failed for this pull request.
            Service: ${{ inputs.service }}
            Branch: ${{ inputs.head_ref }}
            Author: ${{ inputs.actor }}
            PR URL: ${{ inputs.pr_url }}

            Please fix the Docker build issue before requesting approval again.

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: service-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/service-image.tar

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:pr-${{ inputs.pr_number }}
          severity: CRITICAL
          exit-code: 0

      - name: Send Trivy failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [${{ inputs.service }}] Trivy Scan — PR #${{ inputs.pr_number }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CI Pipeline <${{ secrets.MAIL_USERNAME }}>
          body: |
            Trivy detected HIGH or CRITICAL image vulnerabilities for this pull request.
            Service: ${{ inputs.service }}
            Branch: ${{ inputs.head_ref }}
            Author: ${{ inputs.actor }}
            PR URL: ${{ inputs.pr_url }}

            Please update the base image or dependencies and fix the reported vulnerabilities before requesting approval again.

  all-checks-passed:
    runs-on: ubuntu-latest
    needs: [sonarqube, snyk, docker-build, trivy-scan]
    steps:
      - name: Summary
        run: echo "✅ All PR checks passed for ${{ inputs.service }}. Ready for reviewer approval."
