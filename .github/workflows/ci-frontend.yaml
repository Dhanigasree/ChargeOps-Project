name: CI - Frontend (React)

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "ev-frontend/**"

jobs:
  ci:
    name: Run CI template
    uses: ./.github/workflows/ci-frontend-template.yaml
    with:
      service: frontend
      working_directory: ev-frontend
      node_version: "24"
      test_command: "npm run test -- --coverage --watchAll=false"
      sonar_project_base_dir: ev-frontend
      pr_number: ${{ github.event.pull_request.number }}
      head_ref: ${{ github.head_ref }}
      actor: ${{ github.actor }}
      pr_url: ${{ github.event.pull_request.html_url }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
