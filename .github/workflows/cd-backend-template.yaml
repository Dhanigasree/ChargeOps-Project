# File: .github/workflows/cd-backend-template.yaml
name: Reusable CD Template - Backend (Node.js)

on: 
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      k8s_manifest_path:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working_directory }}
          file: ${{ inputs.working_directory }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:latest
          build-args: NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-k8s-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tag in manifest
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          manifest_path = pathlib.Path("${{ inputs.k8s_manifest_path }}")
          service = "${{ inputs.service }}"
          username = "${{ secrets.DOCKERHUB_USERNAME }}"
          sha = "${{ github.sha }}"
          target_image = f"{username}/{service}:{sha}"

          content = manifest_path.read_text(encoding="utf-8")

          # Debug: show all image lines found
          print("=== Image lines found in manifest ===")
          for i, line in enumerate(content.splitlines(), 1):
              if "image:" in line:
                  print(f"  Line {i}: {repr(line)}")

          # Match any image line containing the service name - flexible pattern
          pattern = re.compile(
              rf"^(\s*image:\s+)\S*{re.escape(service)}\S*\s*$",
              re.MULTILINE
          )

          updated, count = pattern.subn(
              lambda m: f"{m.group(1)}{target_image}",
              content
          )

          if count == 0:
              print(f"No image reference found for '{service}' in {manifest_path}", file=sys.stderr)
              print("=== Full file content ===", file=sys.stderr)
              print(content, file=sys.stderr)
              sys.exit(1)

          manifest_path.write_text(updated, encoding="utf-8")
          print(f"Updated {count} image reference(s) to {target_image}")
          PY

      - name: Commit and push manifest update
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${{ inputs.k8s_manifest_path }}"
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "ci: update ${{ inputs.service }} image to ${{ github.sha }} [skip ci]"
          git push