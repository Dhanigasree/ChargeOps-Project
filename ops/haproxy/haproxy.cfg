global
    log /dev/log local0
    log /dev/log local1 notice 
    daemon
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

frontend chargeops_prod_front
    bind *:80
    default_backend chargeops_prod_frontend_nodes

frontend chargeops_dev_front
    bind *:8081
    default_backend chargeops_dev_frontend_nodes

frontend argocd_front
    bind *:8080
    default_backend argocd_nodes

backend chargeops_prod_frontend_nodes
    balance roundrobin
    option httpchk GET /
    server worker1 172.31.12.24:30090 check
    server worker2 172.31.1.99:30090 check

backend chargeops_dev_frontend_nodes
    balance roundrobin
    option httpchk GET /
    server worker1 172.31.12.24:30080 check
    server worker2 172.31.1.99:30080 check

backend argocd_nodes
    balance roundrobin
    option httpchk GET /healthz
    http-request set-header X-Forwarded-Proto http
    server worker1 172.31.12.24:30082 check
    server worker2 172.31.1.99:30082 check
