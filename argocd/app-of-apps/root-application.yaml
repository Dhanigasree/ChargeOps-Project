apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chargeops-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dhanigasree/ChargeOps.git
    targetRevision: main
    path: argocd/app-of-apps/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
