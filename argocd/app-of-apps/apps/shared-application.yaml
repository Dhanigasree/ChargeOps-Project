apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chargeops-shared
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/Dhanigasree/ChargeOps.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Dhanigasree/ChargeOps.git
      targetRevision: main
      path: helm/chargeops
      helm:
        releaseName: chargeops-shared
        valueFiles:
          - $values/argocd/app-of-apps/values/shared-base.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - FailOnSharedResource=true
