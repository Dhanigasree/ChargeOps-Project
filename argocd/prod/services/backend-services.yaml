apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: prod
  labels:
    app: auth-service
    tier: backend
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: backend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mongodb 27017; do echo "waiting for mongodb"; sleep 5; done
      containers:
        - name: auth-service
          image: dhaniga/auth-service:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: NODE_ENV
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: ALLOWED_ORIGINS
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: JWT_EXPIRES_IN
            - name: ALLOW_ADMIN_REGISTRATION
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: ALLOW_ADMIN_REGISTRATION
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: MONGO_HOST
            - name: MONGO_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: JWT_SECRET
            - name: MONGO_URI
              value: mongodb://$(MONGO_ROOT_USERNAME):$(MONGO_ROOT_PASSWORD)@$(MONGO_HOST):27017/ev-auth-service?authSource=admin
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 18
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: prod
  labels:
    app: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8001
      targetPort: http
