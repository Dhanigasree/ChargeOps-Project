# IMAGE TAG WILL BE REPLACED BY CI PIPELINE
# DO NOT EDIT THE IMAGE LINE MANUALLY
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: admin-service
  namespace: dev
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: dhaniga/admin-service:2c883734a1fedd0c65e0cc2a5686a5944da8fd20
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  strategy:
    blueGreen:
      activeService: admin-service-active
      previewService: admin-service-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
      # prePromotionAnalysis:
      #   templates: []
      # postPromotionAnalysis:
      #   templates: []
