apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-service-ingress
  namespace: chargeops
spec:
  podSelector:
    matchLabels:
      app: ai-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: prod
          podSelector:
            matchLabels:
              app: api-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dev
          podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8008
