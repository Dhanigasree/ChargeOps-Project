apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-service-ingress
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: ai-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8008
