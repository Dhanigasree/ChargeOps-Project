apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: chargeops
  labels:
    app: ai-service
    tier: backend
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        tier: backend
    spec:
      serviceAccountName: ai-service
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ai-service
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/chargeops/ai-service:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8008
          env:
            - name: PORT
              value: "8008"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: NODE_ENV
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: ALLOWED_ORIGINS
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: AWS_REGION
            - name: BEDROCK_MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: BEDROCK_MODEL_ID
            - name: BEDROCK_MAX_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: BEDROCK_MAX_TOKENS
            - name: BEDROCK_TEMPERATURE
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: BEDROCK_TEMPERATURE
            - name: CHAT_MEMORY_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: CHAT_MEMORY_LIMIT
            - name: SERVICE_REQUEST_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: SERVICE_REQUEST_TIMEOUT_MS
            - name: STATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: STATION_SERVICE_URL
            - name: BOOKING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: BOOKING_SERVICE_URL
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: PAYMENT_SERVICE_URL
            - name: REVIEW_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: REVIEW_SERVICE_URL
            - name: ADMIN_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-service-config
                  key: ADMIN_SERVICE_URL
            - name: MONGODB_SECRET_ID
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: MONGODB_SECRET_ID
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 18
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-service
  namespace: chargeops
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/chargeops-ai-service-irsa
