apiVersion: v1
kind: ServiceAccount
metadata:
  name: invoice-worker
  namespace: prod
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::497676936148:role/chargeops-eks-invoice-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-worker
  namespace: prod
  labels:
    app: invoice-worker
    tier: worker
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: invoice-worker
  template:
    metadata:
      labels:
        app: invoice-worker
        tier: worker
    spec:
      serviceAccountName: invoice-worker
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mongodb 27017; do echo "waiting for mongodb"; sleep 5; done
      containers:
        - name: invoice-worker
          image: 497676936148.dkr.ecr.ap-south-1.amazonaws.com/chargeops/payment-service:latest
          imagePullPolicy: Always
          command: ["node", "workers/invoiceWorker.js"]
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: NODE_ENV
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: MONGO_HOST
            - name: MONGO_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: AWS_REGION
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: PAYMENT_INVOICE_BUCKET_NAME
            - name: SQS_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: SQS_QUEUE_URL
            - name: USER_SERVICE_URL
              value: http://user-service:8002
            - name: STATION_SERVICE_URL
              value: http://station-service:8003
            - name: BOOKING_SERVICE_URL
              value: http://booking-service:8004
            - name: MONGO_URI
              value: mongodb://$(MONGO_ROOT_USERNAME):$(MONGO_ROOT_PASSWORD)@$(MONGO_HOST):27017/ev-payment-service?authSource=admin
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
