apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: prod
  labels:
    app: booking-service
    tier: backend
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
        tier: backend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: booking-service
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mongodb 27017; do echo "waiting for mongodb"; sleep 5; done
      containers:
        - name: booking-service
          image: 497676936148.dkr.ecr.ap-south-1.amazonaws.com/chargeops/booking-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8004
          env:
            - name: PORT
              value: "8004"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: NODE_ENV
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: ALLOWED_ORIGINS
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: MONGO_HOST
            - name: MONGO_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chargeops-secrets
                  key: API_KEY
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: AWS_REGION
            - name: SQS_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: SQS_QUEUE_URL
            - name: SQS_NOTIFICATION_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: SQS_NOTIFICATION_QUEUE_URL
            - name: MONGO_URI
              value: mongodb://$(MONGO_ROOT_USERNAME):$(MONGO_ROOT_PASSWORD)@$(MONGO_HOST):27017/ev-booking-service?authSource=admin
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 18
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
