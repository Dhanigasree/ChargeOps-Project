apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-service-tool-access
  namespace: prod
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - station-service
          - booking-service
          - payment-service
          - review-service
          - admin-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: chargeops
          podSelector:
            matchLabels:
              app: ai-service
      ports:
        - protocol: TCP
          port: 8003
        - protocol: TCP
          port: 8004
        - protocol: TCP
          port: 8005
        - protocol: TCP
          port: 8006
        - protocol: TCP
          port: 8007
---
