apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: prod
  labels:
    app: api-gateway
    tier: backend
spec:
  replicas: 2
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: backend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          image: dhaniga/chargeops-api-gateway:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: NODE_ENV
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: chargeops-config
                  key: ALLOWED_ORIGINS
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8001
            - name: USER_SERVICE_URL
              value: http://user-service:8002
            - name: STATION_SERVICE_URL
              value: http://station-service:8003
            - name: BOOKING_SERVICE_URL
              value: http://booking-service:8004
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8005
            - name: REVIEW_SERVICE_URL
              value: http://review-service:8006
            - name: ADMIN_SERVICE_URL
              value: http://admin-service:8007
            - name: AI_SERVICE_URL
              value: http://ai-service:8008
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 18
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: prod
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
